# hostapd.conf - Configuration for the Malicious Access Point

# Specifies which wireless interface to use (e.g., wlan0 or your virtual wlan0_ap)
interface=wlan0

# Uses the standard Linux driver (nl80211) compatible with most modern Wi-Fi cards
driver=nl80211

# The Network Name (SSID) that will appear on the victims' device lists
ssid=WiFi_Gratuit_Aeroport

# Sets the Wi-Fi standard: 'g' corresponds to the 2.4GHz band (highly compatible)
hw_mode=g

# The frequency channel used (Channel 6). Attackers often match the target's channel
channel=6

# Authentication algorithm: 1 = Open System (Open network, no password required)
auth_algs=1

# 0 means the SSID is broadcasted publicly; 1 would make it a "hidden" network
ignore_broadcast_ssid=0