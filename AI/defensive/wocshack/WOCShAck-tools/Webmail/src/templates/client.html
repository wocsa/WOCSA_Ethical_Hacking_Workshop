<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackBox: Client</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_client.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <!-- Header -->
    <header class="bg-primary text-white py-3">
        <div class="container d-flex align-items-center">
            <h1 class="h4 m-0 flex-grow-1">Welcome, {{ username }}!</h1>
            <button class="btn btn-danger ms-auto" onclick="window.location.href='/client/disconnect'">Disconnect</button>
        </div>
    </header>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar pt-5">
                <div class="text-center mb-4">
                    <h5>{{ emails | length }} Email(s) found</h5>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/settings">Settings</a>
                    </li>
                </ul>
            </nav>
            <!-- Main Content -->
            <main class="col-md-9 col-lg-10 offset-md-3 offset-lg-2 px-4 mt-4">
                <div id="emails-container" class="row gy-3">
                    {% for email in emails %}
                    <div class="email-container col-12 p-3 shadow-sm border rounded"
                         onclick="window.location.href='/client/mail?email={{ email[0] }}'">
                        <p class="mb-1"><strong>From:</strong> {{ email[1] }}</p>
                        <p class="mb-0"><strong>Subject:</strong> {{ email[3] }}</p>
                    </div>
                    {% endfor %}
                </div>
            </main>
        </div>
    </div>
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">TrackBox &copy; 2024</p>
    </footer>
</body>
</html>
