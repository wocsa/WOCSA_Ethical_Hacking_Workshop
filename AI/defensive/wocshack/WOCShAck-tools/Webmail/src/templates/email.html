<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackBox: Email View</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_client.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <!-- Header -->
    <header class="bg-primary text-white py-3">
        <div class="container d-flex align-items-center">
            <h1 class="h4 m-0 flex-grow-1">Email Details</h1>
            <button class="btn btn-danger ms-auto" onclick="window.location.href='/client'">Back to Inbox</button>
        </div>
    </header>

    <div class="container mt-4">
        <div class="card shadow-sm p-4">
            <h5 class="mb-3"><strong>From:</strong> {{ email[1] }}</h5>
            <h6 class="mb-3"><strong>Subject:</strong> {{ email[3] }}</h6>
            <hr>
            <p class="whitespace-pre-wrap">{{ email[4] | safe }}</p>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">TrackBox &copy; 2024</p>
    </footer>
</body>
</html>
