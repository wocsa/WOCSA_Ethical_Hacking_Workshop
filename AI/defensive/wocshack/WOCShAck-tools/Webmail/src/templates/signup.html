<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackBox:Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='connection_pages_style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <form action="/signup" method="POST">
        <h1>Sign Up</h1>
        {% block error%}
        <p></p>
        {% endblock %}
        <label for="Ufield">Username:</label>
        <input type="text" id="Ufield" name="Ufield" required><br><br>

        <label for="Pfield">Password:</label>
        <input type="password" id="Pfield" name="Pfield" required><br><br>

        <label for="CPfield">Confirm Password:</label>
        <input type="password" id="CPfield" name="CPfield" required><br><br>

        <button type="submit">Sign Up</button>
    </form>
</body>
</html>
