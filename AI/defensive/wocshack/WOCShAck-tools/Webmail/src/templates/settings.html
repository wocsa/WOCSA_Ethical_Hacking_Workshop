<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackBox: Settings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_client.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <!-- Header -->
    <header class="bg-primary text-white py-3">
        <div class="container d-flex align-items-center">
            <h1 class="h4 m-0 flex-grow-1">Welcome, {{ username }}!</h1>
            <button class="btn btn-danger ms-auto" onclick="window.location.href='/client/disconnect'">Disconnect</button>
        </div>
    </header>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar pt-5">
                <div class="text-center mb-4">
                    <h5>{{ emails | length }} Email(s) found</h5>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/client">return to client</a>
                    </li>
                </ul>
            </nav>
            <!-- Main Content -->
            <main class="col-md-9 col-lg-10 offset-md-3 offset-lg-2 px-4 mt-4">
                <h2>Account Settings</h2>
                {% block error %}
                    <p>{{ error_message }}</p> <!-- Assuming 'error_message' is being passed -->
                {% endblock %}
                <!-- Password Form -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>Change Password</h5>
                    </div>
                    <div class="card-body">
                        <form action="/client/settings/change_password" method="POST">
                            <div class="mb-3">
                                <label for="password" class="form-label">Enter Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                                <label for="password" class="form-label">Enter the new Password</label>
                                <input type="password" class="form-control" name="new_password" required>
                                <label for="password" class="form-label">Confirm the new Password</label>
                                <input type="password" class="form-control" name="confirm_new_password" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Submit</button>
                        </form>
                    </div>
                </div>

                <!-- Delete Account Form -->
                <div class="card">
                    <div class="card-header">
                        <h5>Delete Account</h5>
                    </div>
                    <div class="card-body">
                        <p class="text-danger">Warning: Deleting your account is permanent and cannot be undone.</p>
                        <label for="password" class="form-label">Enter Password</label>
                        <form action="/client/settings/delete_account" method="POST">
                            <input type="password" class="form-control" id="delete_confirmation_password" name="password" required>
                            <br>
                            <button type="submit" class="btn btn-danger">Delete My Account</button>
                        </form>
                    </div>
                </div>

            </main>
        </div>
    </div>
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">TrackBox &copy; 2024</p>
    </footer>
</body>
</html>
